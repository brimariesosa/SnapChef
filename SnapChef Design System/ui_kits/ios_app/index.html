<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SnapChef · iOS UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<link rel="stylesheet" href="styles.css">

<style>
  html, body { margin: 0; height: 100%; background: #efe9dc;
    font-family: var(--font-display); }
  body {
    display: flex; align-items: flex-start; justify-content: center;
    padding: 32px 16px; gap: 32px; flex-wrap: wrap;
    background:
      radial-gradient(circle at 20% 10%, rgba(34,105,64,.08), transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255,178,122,.10), transparent 50%),
      #efe9dc;
    min-height: 100vh;
  }
  .frame-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .frame-label {
    font: 500 12px/1 var(--font-display); color: var(--warm-gray);
    letter-spacing: .08em; text-transform: uppercase;
  }
  /* prevent canvas tabbar overlap; tab bar handled per screen */
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
</head>
<body>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

function App() {
  const [active, setActive] = useState("snap");
  const [scanResult, setScanResult] = useState(false);
  const [onboarded, setOnboarded] = useState(true);

  let body;
  if (!onboarded) body = <OnboardingScreen onDone={() => setOnboarded(true)}/>;
  else if (scanResult) body = <ScanResultsScreen onDone={() => setScanResult(false)}/>;
  else if (active === "snap") body = <SnapScreen onScan={() => setScanResult(true)}/>;
  else if (active === "pantry") body = <PantryScreen/>;
  else if (active === "recipes") body = <RecipesScreen/>;
  else if (active === "profile") body = <ProfileScreen/>;

  const showTabbar = onboarded && !scanResult;

  return (
    <>
      <div className="frame-wrap">
        <div className="frame-label">Onboarding · 1 of 3</div>
        <IOSDevice>
          <OnboardingFlowDemo />
        </IOSDevice>
      </div>

      <div className="frame-wrap">
        <div className="frame-label">Main app · {active}</div>
        <IOSDevice>
          <div style={{ position: "relative", height: "100%" }}>
            {body}
            {showTabbar && <TabBar active={active} onChange={setActive}/>}
          </div>
        </IOSDevice>
      </div>

      <div className="frame-wrap">
        <div className="frame-label">Scan results sheet</div>
        <IOSDevice>
          <ScanResultsScreen onDone={() => {}}/>
        </IOSDevice>
      </div>
    </>
  );
}

function OnboardingFlowDemo() {
  const [done, setDone] = useState(false);
  if (done) return <PantryScreen/>;
  return <OnboardingScreen onDone={() => setDone(true)}/>;
}

ReactDOM.createRoot(document.body.appendChild(document.createElement("div")))
  .render(<App/>);
</script>
</body>
</html>
