<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);position:relative;overflow:hidden;}
  .blob{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none;}
  .b1{width:300px;height:300px;background:rgba(255,178,122,.30);left:-100px;top:-120px;}
  .b2{width:260px;height:260px;background:rgba(130,218,178,.32);right:-80px;bottom:-80px;}
  .b3{width:180px;height:180px;background:rgba(226,92,138,.10);left:30%;top:30%;}
  .label{position:relative;z-index:2;font:800 22px/1 var(--font-display);color:var(--forest-dark);}
  .sub{position:relative;z-index:2;font:500 13px/1.4 var(--font-display);color:var(--warm-gray);margin-top:6px;}
</style></head>
<body>
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
  <div class="label">Decorative blobs · cream gradient</div>
  <div class="sub">3-stop diagonal cream gradient with blurred peach / mint / berry circles. The base layer for every full-screen surface.</div>
</body></html>
