<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);}
  .row{display:grid;grid-template-columns:80px 1fr 90px;gap:12px;align-items:baseline;padding:8px 0;border-bottom:1px dashed var(--border-soft);}
  .row:last-child{border:0;}
  .meta{font:600 11px/1 var(--font-mono);color:var(--fg-2);text-transform:uppercase;letter-spacing:.06em;}
  .px{font:500 11px/1 var(--font-mono);color:var(--fg-3);text-align:right;}
</style></head>
<body>
  <div class="row"><span class="meta">Title</span><span class="t-title">Tomato basil galette</span><span class="px">17 / 700</span></div>
  <div class="row"><span class="meta">Body</span><span class="t-body">Tap a row to edit. Uncheck anything we got wrong.</span><span class="px">15 / 500</span></div>
  <div class="row"><span class="meta">Meta</span><span class="t-meta">3 batches · earliest expires in 2d</span><span class="px">13 / 500</span></div>
  <div class="row"><span class="meta">Caption</span><span class="t-caption">Recipe suggestions</span><span class="px">11 / 700</span></div>
  <div class="row"><span class="meta">Serif</span><span class="t-serif" style="font-size:24px;color:var(--fg-1)">Slow-roasted carrots, harissa &amp; yogurt</span><span class="px">DM Serif</span></div>
</body></html>
