<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);font-family:var(--font-display);}
  .row{display:grid;grid-template-columns:80px 1fr 80px;gap:12px;align-items:baseline;padding:8px 0;border-bottom:1px dashed var(--border-soft);}
  .row:last-child{border:0;}
  .meta{font:600 11px/1 var(--font-mono);color:var(--fg-2);text-transform:uppercase;letter-spacing:.06em;}
  .px{font:500 11px/1 var(--font-mono);color:var(--fg-3);text-align:right;}
</style></head>
<body>
  <div class="row"><span class="meta">Hero</span><span class="t-hero">Snap your fridge</span><span class="px">44 / 900</span></div>
  <div class="row"><span class="meta">H1</span><span class="t-h1">Cook what you have</span><span class="px">34 / 800</span></div>
  <div class="row"><span class="meta">H2</span><span class="t-h2">Use soon — 4 items</span><span class="px">26 / 800</span></div>
  <div class="row"><span class="meta">H3</span><span class="t-h3">Pantry · 12 ingredients</span><span class="px">20 / 700</span></div>
</body></html>
