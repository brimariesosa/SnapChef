<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 22px;border-radius:999px;font:700 15px/1 var(--font-display);border:0;cursor:pointer;}
  .primary{background:linear-gradient(135deg,#226940,#56A56E,#82DAB2);color:#fff;box-shadow:0 10px 24px rgba(34,105,64,.35);}
  .sunset{background:linear-gradient(135deg,#FF7062,#FFB27A,#FED56E);color:#fff;box-shadow:0 10px 24px rgba(255,112,98,.35);}
  .secondary{background:rgba(255,255,255,.92);color:var(--forest-dark);border:1.5px solid rgba(34,105,64,.35);box-shadow:0 6px 14px rgba(31,26,18,.05);}
  .ghost{background:rgba(226,92,138,.12);color:var(--berry);font-size:14px;padding:10px 18px;}
  .icon{width:18px;height:18px;display:inline-block;}
</style></head>
<body><div class="row">
  <button class="btn primary"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M3 9 a3 3 0 0 1 3-3 h2 l2-2 h4 l2 2 h2 a3 3 0 0 1 3 3 v8 a3 3 0 0 1 -3 3 h-12 a3 3 0 0 1 -3 -3z"/><circle cx="12" cy="13" r="4"/></svg>Take Photo</button>
  <button class="btn secondary">Choose from Library</button>
  <button class="btn sunset">Add 4</button>
  <button class="btn ghost"><svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3 l1.5 4.5 L18 9 l-4.5 1.5 L12 15 l-1.5-4.5 L6 9 l4.5-1.5z"/></svg>Demo Library</button>
</div></body></html>
