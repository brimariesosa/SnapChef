<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .row{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:999px;font:600 14px/1 var(--font-display);background:#fff;border:1.5px solid rgba(34,105,64,.4);color:var(--forest);box-shadow:0 1px 3px rgba(31,26,18,.04);}
  .chip.sel{background:linear-gradient(135deg,var(--c),var(--c2));color:#fff;border-color:transparent;box-shadow:0 4px 8px rgba(0,0,0,.18);}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
</style></head>
<body><div class="row">
  <span class="chip sel" style="--c:#226940;--c2:rgba(34,105,64,.7)">All</span>
  <span class="chip" style="border-color:rgba(130,218,178,.5);color:#1F8F5F">Produce</span>
  <span class="chip" style="border-color:rgba(122,188,232,.5);color:#2B7AB5">Dairy</span>
  <span class="chip" style="border-color:rgba(255,112,98,.5);color:#C0382A">Meat</span>
  <span class="chip" style="border-color:rgba(254,213,110,.7);color:#9C7A1F">Pantry</span>
  <span class="chip sel" style="--c:#E25C8A;--c2:rgba(226,92,138,.7)">Spices</span>
</div></body></html>
