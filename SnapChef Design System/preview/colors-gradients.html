<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .g{aspect-ratio:2.6/1;border-radius:var(--r-7);display:flex;align-items:flex-end;padding:14px;color:#fff;font:800 14px/1 var(--font-display);text-shadow:0 1px 2px rgba(0,0,0,.25);}
  .g.bg{color:var(--fg-1);text-shadow:none;}
</style></head>
<body><div class="grid">
  <div class="g" style="background:linear-gradient(135deg,#226940 0%,#56A56E 55%,#82DAB2 100%)">grad-primary</div>
  <div class="g" style="background:linear-gradient(135deg,#FF7062 0%,#FFB27A 55%,#FED56E 100%)">grad-sunset</div>
  <div class="g" style="background:linear-gradient(135deg,#E25C8A 0%,#8E60B2 100%)">grad-berry</div>
  <div class="g" style="background:linear-gradient(135deg,#12462A 0%,#226940 30%,#3F8252 55%,#6B9A5E 78%,#9CC698 100%)">grad-camo</div>
</div></body></html>
