<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);}
  .row{display:flex;gap:8px;flex-wrap:wrap;}
  .b{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r-pill);font:700 13px/1 var(--font-display);}
  .dot{width:8px;height:8px;border-radius:50%;}
</style></head>
<body><div class="row">
  <span class="b" style="background:rgba(43,182,115,.14);color:#1B7C50"><span class="dot" style="background:#2BB673"></span>Fresh</span>
  <span class="b" style="background:rgba(245,194,75,.18);color:#9C7A1F"><span class="dot" style="background:#F5C24B"></span>Use soon</span>
  <span class="b" style="background:rgba(255,138,76,.16);color:#C0531D"><span class="dot" style="background:#FF8A4C"></span>Use now</span>
  <span class="b" style="background:rgba(226,85,63,.14);color:#A8331E"><span class="dot" style="background:#E2553F"></span>Expired</span>
  <span class="b" style="background:rgba(122,116,105,.14);color:#5C5650"><span class="dot" style="background:#7A7469"></span>No date</span>
</div></body></html>
