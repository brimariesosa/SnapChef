<!doctype html><html><head><meta charset="utf-8"><title>Logo preview</title>
<style>body{margin:0;background:#FCF8F0;font:500 12px/1 ui-sans-serif;color:#7A7469;padding:24px;display:flex;flex-direction:column;gap:24px;}.row{display:flex;gap:24px;align-items:center;flex-wrap:wrap;}.tile{padding:24px;background:#fff;border:1px solid rgba(34,105,64,.18);border-radius:16px;display:flex;flex-direction:column;gap:12px;align-items:center;}.dark{background:#0E3922;color:#FCF8F0;}.lbl{letter-spacing:.08em;text-transform:uppercase;font-size:10px;}</style>
</head><body>
<div class="row">
  <div class="tile"><span class="lbl">Mark · cream</span><img src="logo-mark.svg" width="160"></div>
  <div class="tile dark"><span class="lbl">Mark · forest</span><img src="logo-mark.svg" width="160"></div>
  <div class="tile"><span class="lbl">Mark · 64</span><img src="logo-mark.svg" width="64"></div>
  <div class="tile"><span class="lbl">Mark · 32</span><img src="logo-mark.svg" width="32"></div>
</div>
<div class="tile"><span class="lbl">Lockup horizontal</span><img src="logo.svg" width="540"></div>
<div class="tile"><span class="lbl">Wordmark only</span><img src="logo-wordmark.svg" width="420"></div>
</body></html>
